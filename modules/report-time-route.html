<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Time On Route — Adera Sales</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/onboarding.css">
  <style>
    .time-bar { display:flex; align-items:center; gap:10px; }
    .time-bar-wrap { flex:1; background:#e8f0fa; border-radius:20px; height:7px; overflow:hidden; }
    .time-bar-fill { height:100%; border-radius:20px; transition:width .5s; }
    .time-bar-val { font-size:13px; font-weight:700; color:#1a2540; min-width:44px; text-align:right; }
  </style>
</head>
<body>

<div class="page-title">Adera Sales</div>

<div class="phone-frame">
<div id="drawer" data-inject="report-time-route"></div>

  <div class="screen-scroll">

    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24"><rect x="2" y="16" width="3" height="6" rx="1"/><rect x="7" y="11" width="3" height="11" rx="1"/><rect x="12" y="6" width="3" height="16" rx="1"/><rect x="17" y="2" width="3" height="20" rx="1" opacity=".4"/></svg>
        <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>
        <svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="10" rx="2"/><path d="M20 11h2v2h-2z"/><rect x="4" y="9" width="12" height="6" rx="1" fill="currentColor" opacity=".8"/></svg>
      </div>
    </div>

    <div class="top-bar">
      <button class="icon-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="top-bar-title">Time On Route</div>
      <button class="icon-btn" onclick="openDrawer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="content" style="padding-top:14px;">

      <!-- Info Card -->
      <div class="info-card">
        <div class="info-card-label">Avg. Time On Route</div>
        <div class="info-card-value" style="font-size:24px;">5h 42m</div>
        <div class="info-card-sub">This week · Target: 6h 00m</div>
      </div>

      <!-- Time Summary -->
      <div class="section-header" style="margin-top:18px;">
        <span class="section-title">Weekly Summary</span>
      </div>

      <div class="summary-card">
        <div class="summary-card-row">
          <span class="summary-card-label">Total Field Time</span>
          <span class="summary-card-value">28h 30m</span>
        </div>
        <div class="summary-card-row">
          <span class="summary-card-label">Working Days</span>
          <span class="summary-card-value">5</span>
        </div>
        <div class="summary-card-row">
          <span class="summary-card-label">Avg. Per Day</span>
          <span class="summary-card-value">5h 42m</span>
        </div>
        <div class="summary-card-row">
          <span class="summary-card-label">Target Achievement</span>
          <span class="summary-card-value" style="color:#f59e0b;">95%</span>
        </div>
      </div>

      <!-- Daily Breakdown -->
      <div class="section-header" style="margin-top:18px;">
        <span class="section-title">Daily Breakdown</span>
      </div>

      <div class="list-item">
        <div class="list-item-icon ic-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="list-item-content">
          <div class="list-item-title">Monday</div>
          <div style="margin-top:6px;" class="time-bar">
            <div class="time-bar-wrap"><div class="time-bar-fill" style="width:100%;background:linear-gradient(90deg,#28a745,#34d058);"></div></div>
            <span class="time-bar-val">6h 15m</span>
          </div>
        </div>
      </div>

      <div class="list-item">
        <div class="list-item-icon ic-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="list-item-content">
          <div class="list-item-title">Tuesday</div>
          <div style="margin-top:6px;" class="time-bar">
            <div class="time-bar-wrap"><div class="time-bar-fill" style="width:97%;background:linear-gradient(90deg,#28a745,#34d058);"></div></div>
            <span class="time-bar-val">6h 05m</span>
          </div>
        </div>
      </div>

      <div class="list-item">
        <div class="list-item-icon ic-blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="list-item-content">
          <div class="list-item-title">Wednesday</div>
          <div style="margin-top:6px;" class="time-bar">
            <div class="time-bar-wrap"><div class="time-bar-fill" style="width:88%;background:linear-gradient(90deg,#3066be,#60a5fa);"></div></div>
            <span class="time-bar-val">5h 30m</span>
          </div>
        </div>
      </div>

      <div class="list-item">
        <div class="list-item-icon ic-orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="list-item-content">
          <div class="list-item-title">Thursday</div>
          <div style="margin-top:6px;" class="time-bar">
            <div class="time-bar-wrap"><div class="time-bar-fill" style="width:75%;background:linear-gradient(90deg,#f59e0b,#fbbf24);"></div></div>
            <span class="time-bar-val">4h 40m</span>
          </div>
        </div>
      </div>

      <div class="list-item">
        <div class="list-item-icon ic-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="list-item-content">
          <div class="list-item-title">Friday</div>
          <div style="margin-top:6px;" class="time-bar">
            <div class="time-bar-wrap"><div class="time-bar-fill" style="width:96%;background:linear-gradient(90deg,#28a745,#34d058);"></div></div>
            <span class="time-bar-val">6h 00m</span>
          </div>
        </div>
      </div>

      <div style="height:80px;"></div>
    </div>

    <div class="bottom-nav" data-inject="report-time-route"></div>

  </div>
</div>

<script src="../js/app.js"></script>

<script src="../js/onboarding.js"></script>
<script>
  Onboarding.init({
    "key": "adera_report_timeroute_onboarded",
    steps: [
          {
                "target": ".info-card",
                "text": "Time on route analysis — how long you spent traveling vs. at stores.",
                "position": "below"
          },
          {
                "target": ".time-bar",
                "text": "Visual time breakdown for each store visit and transit period.",
                "position": "below"
          }
    ]
  });
</script>
</body>
</html>
