<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>New Support Request — Adera Sales</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/onboarding.css">
</head>
<body>

<div class="page-title">Adera Sales</div>

<div class="phone-frame">

  <div id="drawer" data-inject="support-new-request"></div>

  <div class="screen-scroll">

    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24"><rect x="2" y="16" width="3" height="6" rx="1"/><rect x="7" y="11" width="3" height="11" rx="1"/><rect x="12" y="6" width="3" height="16" rx="1"/><rect x="17" y="2" width="3" height="20" rx="1" opacity=".4"/></svg>
        <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>
        <svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="10" rx="2"/><path d="M20 11h2v2h-2z"/><rect x="4" y="9" width="12" height="6" rx="1" fill="currentColor" opacity=".8"/></svg>
      </div>
    </div>

    <div class="top-bar">
      <button class="icon-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="top-bar-title">New Request</div>
      <button class="icon-btn" onclick="openDrawer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="content" style="padding-top:14px;">

      <div class="info-card" style="margin-bottom:16px;">
        <div class="info-card-label">Submit a Request</div>
        <div class="info-card-value" style="font-size:20px;">New Support Ticket</div>
        <div class="info-card-sub">Fill in the details below and our team will respond</div>
      </div>

      <div class="section-header">
        <span class="section-title">Ticket Information</span>
      </div>

      <div class="form-group">
        <label class="form-label">Subject</label>
        <input type="text" class="form-control" id="nrSubject" placeholder="Brief title for your issue...">
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-control" id="nrCategory">
          <option value="">Select category...</option>
          <option>Product Issue</option>
          <option>App / Technical</option>
          <option>Route / Location</option>
          <option>Outlet Management</option>
          <option>Scheme / Pricing</option>
          <option>Order Issue</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-control" id="nrPriority">
          <option value="">Select priority...</option>
          <option>Low — General question</option>
          <option>Medium — Affects my work</option>
          <option>High — Blocking my tasks</option>
          <option>Urgent — Critical issue</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Related Outlet (optional)</label>
        <select class="form-control" id="nrOutlet">
          <option value="">Select outlet...</option>
          <option>Hari General Store — Balaju</option>
          <option>Shrestha Mart — Lazimpat</option>
          <option>Nepal Traders — Ason</option>
          <option>Pokhara Supplies — Naxal</option>
          <option>Everest Shop — Thamel</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-control" rows="4" id="nrDesc" placeholder="Describe your issue in detail..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Attachments (optional)</label>
        <div id="attachZone" style="border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;color:var(--text-secondary);cursor:pointer;" onclick="showToast('File attachment requires backend integration', 'info')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:32px;height:32px;margin:0 auto 8px;display:block;opacity:.5;"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          <span style="font-size:13px;">Tap to attach files or photos</span>
        </div>
      </div>

      <div style="margin-top:20px;display:flex;gap:10px;">
        <button class="btn btn-outline" style="flex:1;" onclick="goBack()">Cancel</button>
        <button class="btn btn-primary" style="flex:2;" onclick="submitTicket()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Submit Ticket
        </button>
      </div>

      <div style="height:80px;"></div>
    </div>

    <div class="bottom-nav" data-inject="support-new-request"></div>

  </div>
</div>

<script src="../js/app.js"></script>
<script>
  // Pre-fill category from support-category page
  (function() {
    var prefill = localStorage.getItem('support_prefill_category');
    if (prefill) {
      var sel = document.getElementById('nrCategory');
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].text === prefill) {
          sel.selectedIndex = i;
          break;
        }
      }
      localStorage.removeItem('support_prefill_category');
    }
  })();

  function submitTicket() {
    var subject = document.getElementById('nrSubject').value.trim();
    var category = document.getElementById('nrCategory').value;
    var priority = document.getElementById('nrPriority').value;
    var desc = document.getElementById('nrDesc').value.trim();

    if (!subject) { showToast('Please enter a subject', 'error'); return; }
    if (!category) { showToast('Please select a category', 'error'); return; }
    if (!priority) { showToast('Please select a priority', 'error'); return; }
    if (!desc) { showToast('Please describe your issue', 'error'); return; }

    showToast('Ticket #' + (1025 + Math.floor(Math.random() * 100)) + ' submitted successfully', 'success');
    setTimeout(function() { goTo('support.html'); }, 800);
  }
</script>

<script src="../js/onboarding.js"></script>
<script>
  Onboarding.init({
    "key": "adera_support_newreq_onboarded",
    steps: [
          {
                "target": ".info-card",
                "text": "Create a new support ticket by filling in the details below.",
                "position": "below"
          },
          {
                "target": ".form-group",
                "text": "Select category, priority, and describe your issue clearly.",
                "position": "below"
          }
    ]
  });
</script>
</body>
</html>
