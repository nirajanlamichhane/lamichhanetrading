<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Product Sales — Adera Sales</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/onboarding.css">
</head>
<body>

<div class="page-title">Adera Sales</div>

<div class="phone-frame">
<div id="drawer" data-inject="report-product-sales"></div>

  <div class="screen-scroll">

    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24"><rect x="2" y="16" width="3" height="6" rx="1"/><rect x="7" y="11" width="3" height="11" rx="1"/><rect x="12" y="6" width="3" height="16" rx="1"/><rect x="17" y="2" width="3" height="20" rx="1" opacity=".4"/></svg>
        <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>
        <svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="10" rx="2"/><path d="M20 11h2v2h-2z"/><rect x="4" y="9" width="12" height="6" rx="1" fill="currentColor" opacity=".8"/></svg>
      </div>
    </div>

    <div class="top-bar">
      <button class="icon-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="top-bar-title">Product Sales</div>
      <button class="icon-btn" onclick="openDrawer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="content" style="padding-top:14px;">

      <!-- Info Card -->
      <div class="info-card">
        <div class="info-card-title">Product Sales</div>
        <div class="info-card-value">Rs 4,52,800 Total</div>
        <div class="info-card-subtitle">This week's product-wise breakdown</div>
      </div>

      <!-- Top Products -->
      <div class="section-header" style="margin-top:18px;">
        <span class="section-title">Top Products</span>
      </div>

      <div class="list-item">
        <div class="list-item-icon ic-blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>
        <div class="list-item-content">
          <div class="list-item-title">Product A</div>
          <div class="list-item-subtitle">Rs 1,24,500</div>
        </div>
        <span class="badge badge-primary">28%</span>
      </div>

      <div class="list-item">
        <div class="list-item-icon ic-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>
        <div class="list-item-content">
          <div class="list-item-title">Product B</div>
          <div class="list-item-subtitle">Rs 98,200</div>
        </div>
        <span class="badge badge-primary">22%</span>
      </div>

      <div class="list-item">
        <div class="list-item-icon ic-orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>
        <div class="list-item-content">
          <div class="list-item-title">Product C</div>
          <div class="list-item-subtitle">Rs 76,400</div>
        </div>
        <span class="badge badge-primary">17%</span>
      </div>

      <div class="list-item">
        <div class="list-item-icon ic-purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>
        <div class="list-item-content">
          <div class="list-item-title">Product D</div>
          <div class="list-item-subtitle">Rs 65,800</div>
        </div>
        <span class="badge badge-primary">15%</span>
      </div>

      <div class="list-item">
        <div class="list-item-icon ic-teal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>
        <div class="list-item-content">
          <div class="list-item-title">Product E</div>
          <div class="list-item-subtitle">Rs 87,900</div>
        </div>
        <span class="badge badge-primary">19%</span>
      </div>

      <div style="height:80px;"></div>
    </div>

    <div class="bottom-nav" data-inject="report-product-sales"></div>

  </div>
</div>

<script src="../js/app.js"></script>

<script src="../js/onboarding.js"></script>
<script>
  Onboarding.init({
    "key": "adera_report_productsales_onboarded",
    steps: [
          {
                "target": ".info-card",
                "text": "Product-wise sales breakdown showing top sellers and slow movers.",
                "position": "below"
          },
          {
                "target": ".list-item",
                "text": "Each product with units sold, revenue, and growth trend.",
                "position": "below"
          }
    ]
  });
</script>
</body>
</html>
